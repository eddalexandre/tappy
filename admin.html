<!DOCTYPE html>
<html>
<head>
    <title>Painel NFC - Igrejas</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 400px; margin: auto; }
        input { width: 100%; margin-bottom: 10px; padding: 8px; }
        button { width: 100%; padding: 10px; background: #0070f3; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Atualizar Link NFC</h2>
    <input type="text" id="idTag" placeholder="ID da Tag (ex: b01)">
    <input type="text" id="urlDestino" placeholder="Nova URL (https://...)">
    <button onclick="salvar()">Salvar Link</button>

    <script>
        async function salvar() {
            const id = document.getElementById('idTag').value;
            const url = document.getElementById('urlDestino').value;
            
            // Aqui você chamará uma função de API que vamos criar para gravar no Redis
            const res = await fetch(`/api/update?id=${id}&url=${encodeURIComponent(url)}`);
            if (res.ok) alert("Link atualizado com sucesso!");
            else alert("Erro ao salvar.");
        }
    </script>
</body>
</html>
