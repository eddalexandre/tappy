<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Tappy - Controle de Tags</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; max-width: 450px; margin: auto; background-color: #f4f7f6; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #333; margin-top: 0; text-align: center; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input { width: 100%; margin-bottom: 20px; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; background: #0070f3; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; transition: background 0.3s; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .footer { text-align: center; margin-top: 20px; font-size: 12px; color: #888; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Painel Tappy</h2>
        
        <label for="idTag">ID da Tag (gravado no chip)</label>
        <input type="text" id="idTag" placeholder="Ex: b01, banco-02..." required>

        <label for="urlDestino">Link de Destino (Instagram, Pix, Site)</label>
        <input type="text" id="urlDestino" placeholder="exemplo.com.br" required>

        <button id="btnSalvar" onclick="salvar()">Salvar Configuração</button>
    </div>

    <div class="footer">Sistema Tappy One - 2026</div>

    <script>
        async function salvar() {
            const btn = document.getElementById('btnSalvar');
            const idInput = document.getElementById('idTag');
            const urlInput = document.getElementById('urlDestino');

            let id = idInput.value.trim();
            let url = urlInput.value.trim();

            if (!id || !url) {
                alert("Por favor, preencha todos os campos.");
                return;
            }

            // TRAVA DE SEGURANÇA: Se o usuário não digitou http, nós colocamos
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }

            // Desativa o botão para evitar cliques duplos
            btn.disabled = true;
            btn.innerText = "Salvando...";

            try {
                // Enviamos a URL já corrigida para a API
                const res = await fetch(`/api/update?id=${id}&url=${encodeURIComponent(url)}`);
                
                if (res.ok) {
                    alert("Sucesso! O ID '" + id + "' agora aponta para: " + url);
                    urlInput.value = ""; // Limpa apenas o link para facilitar o próximo
                } else {
                    const errorData = await res.json();
                    alert("Erro do servidor: " + (errorData.error || "Desconhecido"));
                }
            } catch (e) {
                alert("Erro de conexão. Verifique se o site está online.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Salvar Configuração";
            }
        }
    </script>
</body>
</html>
